# =========================
# SERVER
# =========================
server.port=8080

# =========================
# DATABASE (H2 - DEV)
# =========================
spring.datasource.url=jdbc:h2:mem:qalab
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# =========================
# KAFKA - PRODUCER
# =========================
spring.kafka.bootstrap-servers=localhost:9092

spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer

# =========================
# KAFKA - CONSUMER
# =========================
spring.kafka.consumer.group-id=qa-group
spring.kafka.consumer.auto-offset-reset=earliest

spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer

spring.kafka.consumer.properties.spring.json.trusted.packages=com.qa.lab.qa_backend.event
spring.kafka.consumer.properties.spring.json.value.default.type=com.qa.lab.qa_backend.event.UserCreatedEvent

# =========================
# TOPICS
# =========================
app.kafka.topics.user-created=user-created-events